services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: process_opt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d process_opt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.10
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data

  gateway:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    command: scripts/run-gateway.sh
    environment:
      PROCESS_OPT_GATEWAY_API_KEY: "change-me"
      PROCESS_OPT_NATS_URL: "nats://nats:4222"
      PROCESS_OPT_GATEWAY_PORT: "8001"
    depends_on:
      - nats

  consumer:
    build: .
    restart: unless-stopped
    command: scripts/run-consumer.sh
    environment:
      PROCESS_OPT_NATS_URL: "nats://nats:4222"
      PROCESS_OPT_POSTGRES_DSN: "postgresql://postgres:postgres@postgres:5432/process_opt"
    depends_on:
      - postgres
      - nats

  backend-api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: scripts/run-api.sh
    environment:
      PROCESS_OPT_POSTGRES_DSN: "postgresql://postgres:postgres@postgres:5432/process_opt"
      PROCESS_OPT_API_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: Asia/Shanghai
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/auth-secrets:/home/node/.config/openclaw
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://127.0.0.1:18789/healthz"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  nats-data:
